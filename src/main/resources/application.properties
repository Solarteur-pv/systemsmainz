spring.application.name=systemsmainz

# ============================
# DATASOURCE (H2 persistent)
# ============================
spring.datasource.url=jdbc:h2:file:./data/systemsmainz;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2-Konsole
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================
# MULTIPART (für Uploads)
# ============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================
# THYMELEAF
# ============================
spring.thymeleaf.cache=false

# ============================
# LOGGING
# ============================
logging.level.org.springframework=INFO
logging.level.com.tombo=DEBUG

# ============================
# EMAIL (info@solarteur.eu)
# ============================
spring.mail.host=mail.solarteur.eu
spring.mail.port=587
spring.mail.username=info@solarteur.eu
spring.mail.password=12345
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.web.resources.static-locations=classpath:/static/,file:uploads/
