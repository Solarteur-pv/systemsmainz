<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Users</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/users_style.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/header_style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- Header und Navigation -->
<div th:replace="fragments/header-admin :: header"></div>

<!-- Hauptinhalt -->
<div class="page-content">
    <div class="content">

        <!-- 1️⃣ USER ERSTELLEN -->
        <section class="create-user">
            <h2>Neuen Benutzer erstellen</h2>

            <form th:action="@{/registration_a}" th:object="${user}" method="post">

                <div>
                    <label th:text="Email:">Email:</label>
                    <input type="email" th:field="*{email}" required>
                </div>

                <div>
                    <label th:text="Passwort:">Passwort:</label>
                    <input type="password" th:field="*{password}" required>
                </div>

                <div>
                    <label th:text="Rolle:">Rolle:</label>
                    <select th:field="*{role}">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>

                <button type="submit">Registrieren</button>

                <p th:if="${message}" th:text="${message}"></p>
            </form>
        </section>

        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success">
            <span th:text="${message}"></span>
        </div>


        <!-- 2️⃣ NORMALE USER -->
        <section class="user-list">
            <h2>User Liste</h2>

            <!-- Suchfeld -->
            <form method="GET" th:action="@{/users}">
                <input type="text" name="search"
                       th:placeholder="Suchen"
                       th:value="${search}">
                <button type="submit">Suchen</button>
            </form>

            <!-- Tabelle -->
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Benutzername</th>
                    <th>Email</th>
                    <th>Rolle</th>
                    <th>Aktionen</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.role}"></td>

                    <td>
                        <a th:href="@{'/edituser/' + ${u.id}}">Bearbeiten</a> |
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <div class="pagination">
            <span th:if="${page.hasPrevious()}">
                <a th:href="@{/users(page=${page.number - 1}, search=${search})}">
                    Vorherige
                </a>
            </span>

                <span th:text="'Seite' + ' ' + (${page.number} + 1) + ' ' + 'von' + ' ' + ${page.totalPages}">
                Seite X von Y
            </span

                <span th:if="${page.hasNext()}">
                <a th:href="@{/users(page=${page.number + 1}, search=${search})}">
                    Nächste
                </a>
            </span>
            </div>
        </section>

    </div>
    <div th:replace="fragments/footer :: footer"></div>
</div>
</body>
</html>
