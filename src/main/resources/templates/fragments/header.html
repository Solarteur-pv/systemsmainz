<div th:fragment="header">

    <!-- Header und Navigation -->
    <header class="gr-header clean-header">
        <nav class="gr-nav">

            <!-- Logo -->
            <div class="gr-logo">
                <a th:href="@{/}">
                    <img src="/images/logo/logo.png" alt="logo" class="logo" />
                </a>
            </div>

            <!-- Cart Icon oben rechts -->
            <div class="gr-cart">
                <a th:href="@{/cart}">
                    <svg class="cart-svg" viewBox="0 0 24 24">
                        <path d="M6 6h15l-1.5 9h-12z" />
                        <circle cx="9" cy="20" r="1.5" />
                        <circle cx="18" cy="20" r="1.5" />
                    </svg>
                    <span class="cart-count" th:text="${cartCount}">0</span>
                </a>
            </div>

            <!-- Rechts: Burger + Menü -->
            <div class="gr-right">
                <div class="gr-burger" onclick="grToggleMenu()">☰</div>

                <ul class="gr-menu" id="grMenu">
                    <li><a th:href="@{/}">Home</a></li>
                    <li><a th:href="@{/shop}">Shop</a></li>
                    <li><a th:href="@{/about}">Das Unternehmen</a></li>
                    <li><a th:href="@{/downloads}">Downloads</a></li>
                    <li><a th:href="@{/career}">Beruf & Karriere</a></li>
                    <li><a th:href="@{/partner}">Partner</a></li>
                    <li><a th:href="@{/referenzen}">Referenzen</a></li>
                    <li><a th:href="@{/login}">Login</a></li>
                </ul>
            </div>

        </nav>
    </header>
    <script>
        // Hamburger-Menü
        function grToggleMenu() {
            document.getElementById("grMenu").classList.toggle("gr-open");
        }

        // Darkmode beim Laden wiederherstellen
        if (localStorage.getItem("darkMode") === "true") {
            document.body.classList.add("dark");

            const toggle = document.getElementById("darkSwitch");
            if (toggle) {
                toggle.checked = true;
            }
        }

        // Darkmode toggeln
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle("dark");
            localStorage.setItem("darkMode", isDark);
        }
    </script>
</div>
